<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do 메모</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>To-Do 메모</h1>
      <p class="subtitle">할 일을 기록하고 관리하세요</p>
    </header>

    <section class="input-section">
      <select id="memoType" class="select-type">
        <option value="work">업무</option>
        <option value="personal">개인</option>
        <option value="study">학습</option>
        <option value="other" selected>기타</option>
      </select>
      <input
        type="text"
        id="memoInput"
        placeholder="메모를 입력하세요..."
        maxlength="200"
        autocomplete="off"
      />
      <button type="button" id="addBtn" class="btn btn-add">추가</button>
    </section>

    <ul id="memoList" class="memo-list"></ul>

    <footer class="footer">
      <span id="countText">0개의 메모</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
